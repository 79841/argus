services:
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "9845:9845"
    environment:
      - ARGUS_DB_PATH=/data/argus.db
      - PORT=9845
    volumes:
      - argus-data:/data

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: argus-otel-collector
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133/"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  argus-data:
