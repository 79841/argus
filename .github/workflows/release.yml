name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  dist-mac:
    name: Build macOS (arm64)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm electron:dist:mac
      - uses: actions/upload-artifact@v5
        with:
          name: Argus-macOS-arm64
          path: dashboard/release/*.dmg
          retention-days: 7

  dist-win:
    name: Build Windows (x64)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm electron:dist:win
      - uses: actions/upload-artifact@v5
        with:
          name: Argus-Windows-x64
          path: dashboard/release/*.exe
          retention-days: 7

  dist-linux:
    name: Build Linux (x64, AppImage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build && pnpm electron:build && electron-builder --linux
      - uses: actions/upload-artifact@v5
        with:
          name: Argus-Linux-x64
          path: dashboard/release/*.AppImage
          retention-days: 7

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [dist-mac, dist-win, dist-linux]
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: Argus-macOS-arm64
          path: artifacts/mac
      - uses: actions/download-artifact@v5
        with:
          name: Argus-Windows-x64
          path: artifacts/win
      - uses: actions/download-artifact@v5
        with:
          name: Argus-Linux-x64
          path: artifacts/linux
      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            artifacts/mac/*.dmg
            artifacts/win/*.exe
            artifacts/linux/*.AppImage
          generate_release_notes: true
