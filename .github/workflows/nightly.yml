name: Nightly Check

on:
  schedule:
    # 매일 새벽 2:30 KST (= 17:30 UTC 전날)
    - cron: '30 17 * * *'
  workflow_dispatch:

jobs:
  check:
    name: Lint / Type / Test / Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Type Check
        run: npx tsc --noEmit
      - name: Test
        run: pnpm test:run
      - name: Build
        run: pnpm build

  review:
    name: Code Review (yesterday's commits)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get yesterday's commits
        id: commits
        run: |
          SINCE=$(date -u -d '24 hours ago' '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null || date -u -v-24H '+%Y-%m-%dT%H:%M:%SZ')
          COMMITS=$(git log --since="$SINCE" --oneline --no-merges)
          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No commits in the last 24 hours"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "$COMMITS"
            DIFF=$(git diff "$(git log --since="$SINCE" --reverse --format=%H | head -1)^"..HEAD --stat)
            {
              echo "summary<<EOF"
              echo "## Commits (last 24h)"
              echo ""
              echo '```'
              echo "$COMMITS"
              echo '```'
              echo ""
              echo "## Changed Files"
              echo ""
              echo '```'
              echo "$DIFF"
              echo '```'
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi
      - name: Post review issue
        if: steps.commits.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(cat <<'ISSUE_EOF'
          ${{ steps.commits.outputs.summary }}

          ---
          > Nightly review — 변경사항을 확인하고 코드 품질 이슈가 있으면 코멘트를 남겨주세요.
          ISSUE_EOF
          )
          EXISTING=$(gh issue list --label "nightly-review" --state open --limit 1 --json number -q '.[0].number')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create \
              --title "Nightly Review — $(date -u '+%Y-%m-%d')" \
              --body "$BODY" \
              --label "nightly-review"
          fi
