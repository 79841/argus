name: Nightly Check

on:
  schedule:
    # 매일 새벽 2:30 KST (= 17:30 UTC 전날)
    - cron: '30 17 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    name: Lint / Type / Test / Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Rebuild better-sqlite3 for Node.js
        run: npm rebuild better-sqlite3
      - name: Lint
        run: pnpm lint
      - name: Type Check
        run: npx tsc --noEmit
      - name: Test
        run: pnpm test:run
      - name: Build
        run: pnpm build

  dist-mac:
    name: Build macOS (arm64)
    runs-on: macos-latest
    needs: check
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm electron:dist:mac
      - uses: actions/upload-artifact@v5
        with:
          name: Argus-macOS-arm64
          path: dashboard/release/*.dmg
          retention-days: 14

  dist-win:
    name: Build Windows (x64)
    runs-on: windows-latest
    needs: check
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm electron:dist:win
      - uses: actions/upload-artifact@v5
        with:
          name: Argus-Windows-x64
          path: dashboard/release/*.exe
          retention-days: 14

  review:
    name: Code Review (yesterday's commits)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Get yesterday's commits
        id: commits
        run: |
          SINCE=$(date -u -d '24 hours ago' '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null || date -u -v-24H '+%Y-%m-%dT%H:%M:%SZ')
          COMMITS=$(git log --since="$SINCE" --oneline --no-merges)
          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No commits in the last 24 hours"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            FIRST=$(git log --since="$SINCE" --reverse --format=%H | head -1)
            DIFF=$(git diff "$FIRST^"..HEAD --stat 2>/dev/null || git diff "$FIRST"..HEAD --stat)
            {
              echo "summary<<EOF"
              echo "## Commits (last 24h)"
              echo ""
              echo '```'
              echo "$COMMITS"
              echo '```'
              echo ""
              echo "## Changed Files"
              echo ""
              echo '```'
              echo "$DIFF"
              echo '```'
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi
      - name: Post review issue
        if: steps.commits.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUMMARY: ${{ steps.commits.outputs.summary }}
        run: |
          BODY="${SUMMARY}

          ---
          > Nightly review — 변경사항을 확인하고 코드 품질 이슈가 있으면 코멘트를 남겨주세요.
          > Claude 자동 리뷰는 PER-229에서 추가 예정."

          EXISTING=$(gh issue list --search "Nightly Review" --state open --limit 1 --json number -q '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create \
              --title "Nightly Review — $(date -u '+%Y-%m-%d')" \
              --body "$BODY"
          fi
